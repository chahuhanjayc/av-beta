{% extends "base.html" %}

{% block title %}Add Income - SpendSight{% endblock %}
{% block page_title %}Add Income{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <form method="post" class="row g-3">
          {% csrf_token %}
          <div class="col-md-6">
            <label class="form-label fw-semibold">Amount</label>
            <div class="input-group">
              <span class="input-group-text">{{ currency_symbol }}</span>
              <input type="number" step="0.01" name="amount" class="form-control" required>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Date</label>
            <input type="date" name="date" class="form-control" value="{{ today|date:'Y-m-d' }}" required>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Source</label>
            <input type="text" name="source" class="form-control" placeholder="Salary, Freelance, Refund" required>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Description</label>
            <textarea name="description" class="form-control" rows="3"></textarea>
          </div>
          <div class="col-12 d-flex justify-content-end gap-2">
            <a href="{% url 'personal_finance:income_and_budget' %}" class="btn btn-light">Cancel</a>
            <button type="submit" class="btn btn-success">Save Income</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
