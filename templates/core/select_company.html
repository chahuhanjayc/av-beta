{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Workspace – Akshaya Vistara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <style>
        .select-container { max-width: 720px; padding: 1.5rem; z-index: 10; }
        .brand-header { text-align: center; margin-bottom: 2rem; }
        .brand-name { font-size: 1.25rem; font-weight: 700; color: var(--accent-blue); margin-bottom: 0.25rem; }
        .company-card { 
            cursor: pointer; transition: all 0.2s; border-radius: 8px; padding: 1rem; 
            text-align: left; background: var(--card-bg); border: 1px solid var(--border-color); 
        }
        .company-card:hover { transform: translateY(-3px); border-color: var(--accent-blue); }
        .icon-box { width: 40px; height: 40px; font-size: 1.25rem; }
        .role-badge { font-size: 0.65rem; }
    </style>
    <script>
        (function() {
          const theme = localStorage.getItem('theme') || 'light';
          document.documentElement.setAttribute('data-bs-theme', theme);
        })();
    </script>
</head>
<body>
    <div class="bg-decor" style="top: 15%; left: 10%;">Audit Trail [v1.2]</div>
    <div class="bg-decor" style="bottom: 20%; right: 15%;">Multi-tenant Isolation</div>

    <div class="select-container">
        <div class="brand-header">
            <div class="brand-name">Akshaya Vistara</div>
            <p class="text-muted small" style="font-size: 0.75rem;">Select a workspace to continue</p>
        </div>

        {% if access_list %}
        <div class="row g-3">
            {% for access in access_list %}
            <div class="col-md-6">
                <form method="post">
                    {% csrf_token %}
                    <input type="hidden" name="company_id" value="{{ access.company.pk }}" />
                    <button type="submit" class="btn w-100 p-0 border-0">
                        <div class="company-card shadow-sm">
                            <div class="d-flex gap-3 align-items-center">
                                <div class="icon-box rounded bg-primary bg-opacity-10 d-flex align-items-center justify-content-center text-primary">
                                    <i class="bi bi-building"></i>
                                </div>
                                <div class="overflow-hidden">
                                    <div class="fw-bold text-truncate small">{{ access.company.name }}</div>
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="badge bg-secondary bg-opacity-10 text-secondary role-badge">{{ access.role }}</span>
                                        {% if access.company.gstin %}
                                        <span class="text-muted text-truncate" style="font-size: 0.65rem;">· {{ access.company.gstin }}</span>
                                        {% endif %}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </button>
                </form>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="text-center mt-5">
            <a href="{% url 'accounts:logout' %}" class="text-muted small text-decoration-none" style="font-size: 0.75rem;">
                <i class="bi bi-box-arrow-right me-1"></i> Sign out from system
            </a>
        </div>
    </div>
</body>
</html>
