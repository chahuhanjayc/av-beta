{% extends "base.html" %}
{% block title %}Upload Successful – {{ company.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 text-center">
    <div class="card border-0 shadow-lg p-5">
      <div class="card-body">
        <i class="bi bi-check-circle-fill display-1 text-success mb-4"></i>
        <h3 class="fw-bold mb-3">Upload Successful!</h3>
        <p class="text-muted mb-4">
          Your documents have been securely sent to <strong>{{ company.name }}</strong> for processing.
        </p>
        
        <a href="." class="btn btn-outline-primary btn-lg px-5">
          <i class="bi bi-plus-lg me-2"></i> Upload More
        </a>
      </div>
    </div>
    
    <div class="mt-5">
      <p class="small text-muted">Secure portal powered by Akshaya Vistara</p>
    </div>
  </div>
</div>

<style>
  /* Simplified UI for external clients - hide sidebar and topbar */
  #sidebar, #topbar { display: none !important; }
  #main-content { margin-left: 0 !important; width: 100% !important; }
</style>
{% endblock %}
