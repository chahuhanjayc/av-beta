{% extends "base.html" %}
{% block title %}Delete Exchange Rate – Akshaya Vistara{% endblock %}
{% block page_title %}Delete Exchange Rate{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-5">
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-danger text-white py-3"><h6 class="mb-0">Confirm Deletion</h6></div>
    <div class="card-body">
      <p>Delete: <strong>{{ rate }}</strong>?</p>
      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Delete</button>
          <a href="{% url 'forex:exchange_rate_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
