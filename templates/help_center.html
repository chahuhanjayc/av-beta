              return `
                <article class="guide-item">
                  <div class="d-flex align-items-start justify-content-between gap-2">
                    <div class="min-w-0">
                      <h6 class="fw-bold mb-1 text-dark" style="font-size:0.82rem;">${escapeHtml(item.title)}</h6>
                      <p class="mb-0 text-muted" style="font-size:0.74rem;">${escapeHtml(item.text || "Use this menu for the related workflow.")}</p>
                    </div>
                    ${item.url ? `<a class="btn btn-xs btn-outline-primary flex-shrink-0" href="${escapeHtml(item.url)}">Open</a>` : ""}
                  </div>
                  <div class="guide-item-grid">
                    <div>
                      <div class="guide-label">Use this when</div>
                      <p class="mb-0 text-muted" style="font-size:0.72rem;">${escapeHtml(details.when)}</p>
                    </div>
                    <div>
                      <div class="guide-label">Result</div>
                      <p class="mb-0 text-muted" style="font-size:0.72rem;">${escapeHtml(details.outcome)}</p>
                    </div>
                  </div>
                  ${(item.steps || []).length ? `
                    <div class="mt-2">
                      <div class="guide-label">Typical flow</div>
                      <ol class="guide-steps">
                        ${item.steps.map(step => `<li>${escapeHtml(step)}</li>`).join("")}
                      </ol>
                    </div>
                  ` : ""}
                </article>
              `;
            }).join("")}
          </div>
        </section>
      `;
    };

    const ruleMatches = (rule, q) => [
      rule.id,
      rule.cat,
      rule.name,
      rule.trigger,
      rule.effect,
      rule.res
    ].join(" ").toLowerCase().includes(q);

    const shouldShowControls = (q, catFilter, matchedRules) => (
      catFilter === "SYSTEM_RULES" ||
      Boolean(q && matchedRules.length)
    );

    const renderControlSection = (rules) => `
      <section class="guide-section">
        <div class="guide-section-summary">
          <div class="guide-label"><i class="bi bi-shield-lock me-1"></i>System Controls</div>
          <h6 class="fw-bold mb-1">Guardrails the app applies automatically.</h6>
          <p class="text-muted small mb-0">These are not training topics. They explain why the app may block, warn, reset approval, or ask for evidence so accounting and statutory records remain defensible.</p>
        </div>
        <div class="mt-2">
          ${rules.map(rule => `
            <div id="rule-${escapeHtml(rule.id)}" class="guide-control-card">
              <div class="d-flex align-items-start justify-content-between gap-2 mb-2">
                <div>
                  <div class="guide-label">${escapeHtml(rule.id)} - ${escapeHtml(rule.cat)}</div>
                  <h6 class="fw-bold mb-0" style="font-size:0.82rem;">${escapeHtml(rule.name)}</h6>
                </div>
                <span class="badge bg-secondary-subtle text-secondary">${escapeHtml(rule.effect)}</span>
              </div>
              <div class="guide-item-grid">
                <div>
                  <div class="guide-label">When it appears</div>
                  <p class="mb-0 text-muted" style="font-size:0.72rem;">${escapeHtml(rule.trigger)}</p>
                </div>
                <div>
                  <div class="guide-label">How to fix it</div>
                  <p class="mb-0 text-muted" style="font-size:0.72rem;">${escapeHtml(rule.res)}</p>
                </div>
              </div>
            </div>
          `).join("")}
        </div>
      </section>
    `;

    window.renderHelp = (query = "", catFilter = "ALL") => {
      let html = "";
      const q = query.toLowerCase().trim();

      if (catFilter === "ALL" && !q) html += renderGuideHome();

      if (catFilter !== "SYSTEM_RULES") {
        USER_GUIDES.forEach(cat => {
          if (catFilter !== "ALL" && catFilter !== cat.category) return;

          const filteredItems = (cat.items || []).filter(item => searchableText(cat.category, item).includes(q));

          if (filteredItems.length > 0) {
            html += renderGuideSection(cat, filteredItems);
          }
        });
      }

      const matchedRules = q ? AUDIT_RULES.filter(rule => ruleMatches(rule, q)) : AUDIT_RULES;
      if (shouldShowControls(q, catFilter, matchedRules)) {
        if (matchedRules.length > 0) html += renderControlSection(matchedRules);
      }

      container.innerHTML = html || `<div class="text-center p-4 text-muted small">No matching topics found.</div>`;
    };

    const setActiveHelpCategory = (category) => {
      document.querySelectorAll('#helpCategoryList .list-group-item').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.category === category);
      });
    };

    // Category Switching
    document.querySelectorAll('#helpCategoryList .list-group-item').forEach(btn => {
      btn.addEventListener('click', () => {
        setActiveHelpCategory(btn.dataset.category);
        renderHelp(input.value, btn.dataset.category);
      });
    });

    input.addEventListener('input', (e) => renderHelp(e.target.value, document.querySelector('#helpCategoryList .active').dataset.category));
    
    document.getElementById('helpCenterModal').addEventListener('show.bs.modal', () => {
      input.value = "";
      setActiveHelpCategory("ALL");
      renderHelp();
    });

    // ════════════════════════════════════════════
    // FIELD-LEVEL HELP ICONS
    // ════════════════════════════════════════════
    function addFieldHelpIcons() {
      const helpTexts = document.querySelectorAll('.form-text, .field-hint');
      helpTexts.forEach(el => {
        const label = el.parentElement.querySelector('label');
        if (label && !label.querySelector('.help-icon')) {
          const icon = document.createElement('i');
          icon.className = 'bi bi-question-circle ms-1 text-primary help-icon';
          icon.style.fontSize = '0.7rem';
          icon.style.cursor = 'pointer';
          icon.title = 'View Expert Rule';
          icon.onclick = () => {
            const modal = new bootstrap.Modal(document.getElementById('helpCenterModal'));
            modal.show();
            const q = el.innerText.split('.')[0]; 
            document.getElementById('helpSearchInput').value = q;
            renderHelp(q);
          };
          label.appendChild(icon);
        }
      });
    };

    document.addEventListener('DOMContentLoaded', addFieldHelpIcons);
    const observer = new MutationObserver(addFieldHelpIcons);
    observer.observe(document.body, { childList: true, subtree: true });

    })();
    </script>
