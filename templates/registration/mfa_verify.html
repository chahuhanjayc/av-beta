<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Login - Akshaya Vistara</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body { background: #f5f6fa; }
    .auth-card { max-width: 420px; margin: 5rem auto; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="h4 fw-bold text-primary mb-1"><i class="bi bi-shield-lock me-2"></i>Verification</div>
      <p class="text-muted small mb-0">Enter the code sent to your email</p>
    </div>
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }} py-2 small">{{ message }}</div>
          {% endfor %}
        {% endif %}
        <form method="post" autocomplete="off">
          {% csrf_token %}
          <label class="form-label">Verification Code</label>
          <input class="form-control form-control-lg text-center font-monospace" name="code" inputmode="numeric" maxlength="6" required autofocus>
          <button type="submit" class="btn btn-primary w-100 mt-3">Verify</button>
        </form>
        <div class="text-center mt-3">
          <a href="{% url 'accounts:login' %}" class="small text-muted text-decoration-none">Back to sign in</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
