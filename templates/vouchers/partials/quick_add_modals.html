<script>
let _qaTargetSelect = null;

function qaCsrfToken() {
    return document.querySelector("[name=csrfmiddlewaretoken]")?.value || "";
}

function normalizeQuickAddText(text) {
    return (text || "").replace(/\s+/g, " ").trim().toLowerCase();
}

function addOptionOnce(select, value, label, extraData = {}) {
    const valueKey = String(value);
    const labelKey = normalizeQuickAddText(label);
    let option = Array.from(select.options).find(opt => String(opt.value) === valueKey);

    if (!option) {
        option = Array.from(select.options).find(opt => {
            return opt.value && !String(opt.value).startsWith("ADD_NEW_") &&
                   normalizeQuickAddText(opt.text) === labelKey;
        });
    }

    if (!option) {
        option = new Option(label, value);
        select.add(option);
    } else {
        option.text = label;
    }

    Object.entries(extraData).forEach(([key, val]) => {
        option.dataset[key] = val ?? "";
    });
    return option;
}

function ensureModalInBody(modalEl) {
    if (modalEl && modalEl.parentElement !== document.body) {
        document.body.appendChild(modalEl);
    }
}

/**
 * Triggered by Alt+C in voucher_form.html
 */
function openQuickAdd(targetInput) {
    _qaTargetSelect = targetInput;
    
    // Reset Ledger Modal
    document.getElementById("qa-name").value = "";
    document.getElementById("qa-group").value = "";
    document.getElementById("qa-opening").value = "0.00";
    document.getElementById("qa-error").classList.add("d-none");

    const modalEl = document.getElementById("quickAddModal");
    ensureModalInBody(modalEl);
    const modal = new bootstrap.Modal(modalEl);
    modal.show();

    modalEl.addEventListener('shown.bs.modal', () => {
        document.getElementById("qa-name").focus();
    }, { once: true });
}

function openStockQuickAdd(targetInput) {
    _qaTargetSelect = targetInput;

    // Reset Stock Modal
    document.getElementById("sqa-name").value = "";
    document.getElementById("sqa-error").classList.add("d-none");

    const modalEl = document.getElementById("stockQuickAddModal");
    ensureModalInBody(modalEl);
    const modal = new bootstrap.Modal(modalEl);
    modal.show();

    modalEl.addEventListener('shown.bs.modal', () => {
        document.getElementById("sqa-name").focus();
    }, { once: true });
}

function openGodownQuickAdd(targetInput) {
    _qaTargetSelect = targetInput;
    document.getElementById("gqa-name").value = "";
    document.getElementById("gqa-location").value = "";
    document.getElementById("gqa-error").classList.add("d-none");

    const modalEl = document.getElementById("godownQuickAddModal");
    ensureModalInBody(modalEl);
    const modal = new bootstrap.Modal(modalEl);
    modal.show();
    modalEl.addEventListener('shown.bs.modal', () => {
        document.getElementById("gqa-name").focus();
    }, { once: true });
}

function openBatchQuickAdd(targetInput) {
    _qaTargetSelect = targetInput;
    const row = targetInput.closest(".stock-row");
    const stockSelect = row?.querySelector(".stock-item-select");
    const selectedStock = stockSelect?.selectedOptions?.[0];

    document.getElementById("bqa-number").value = "";
    document.getElementById("bqa-expiry").value = "";
    document.getElementById("bqa-rate").value = row?.querySelector(".rate-field")?.value || "0.00";
    document.getElementById("bqa-qty").value = row?.querySelector(".qty-field")?.value || "0.000";
    document.getElementById("bqa-error").classList.add("d-none");
    document.getElementById("bqa-context").textContent = selectedStock?.value
        ? `For ${selectedStock.text}`
        : "Select a stock item before saving this batch.";

    const modalEl = document.getElementById("batchQuickAddModal");
    ensureModalInBody(modalEl);
    const modal = new bootstrap.Modal(modalEl);
    modal.show();
    modalEl.addEventListener('shown.bs.modal', () => {
        document.getElementById("bqa-number").focus();
    }, { once: true });
}

function openCCQuickAdd(targetInput) {
    _qaTargetSelect = targetInput;
    document.getElementById("cc-qa-name").value = "";
    document.getElementById("cc-qa-error").classList.add("d-none");
    const modalEl = document.getElementById("ccQuickAddModal");
    ensureModalInBody(modalEl);
    const modal = new bootstrap.Modal(modalEl);
    modal.show();
    modalEl.addEventListener('shown.bs.modal', () => {
        document.getElementById("cc-qa-name").focus();
    }, { once: true });
}

async function submitQuickAdd() {
    const name = document.getElementById("qa-name").value.trim();
    const group = document.getElementById("qa-group").value;
    const opening = document.getElementById("qa-opening").value;
    const errEl = document.getElementById("qa-error");

    if (!name || !group) {
        errEl.textContent = "Name and Group are required.";
        errEl.classList.remove("d-none");
        return;
    }

    const btn = document.getElementById("qa-save-btn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

    try {
        const resp = await fetch("{% url 'ledger:quick_add' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": qaCsrfToken()
            },
            body: JSON.stringify({ name, group, opening_balance: opening })
        });
        const data = await resp.json();
        if (data.success) {
            // Add to ALL ledger selects on the page
            const ledgerSelects = document.querySelectorAll("select.ledger-select");
            ledgerSelects.forEach(sel => {
                addOptionOnce(sel, data.id, data.name);
            });
            
            // Select it in the target
            _qaTargetSelect.value = data.id;
            _qaTargetSelect.dispatchEvent(new Event('change', { bubbles: true }));
            
            bootstrap.Modal.getInstance(document.getElementById("quickAddModal")).hide();
            const ledgerFilter = _qaTargetSelect.closest(".ledger-picker")?.querySelector(".ledger-filter");
            if (ledgerFilter) ledgerFilter.focus();
            else _qaTargetSelect.focus();
        } else {
            errEl.textContent = Object.values(data.errors).flat().join(", ");
            errEl.classList.remove("d-none");
        }
    } catch (e) {
        errEl.textContent = "Network error.";
        errEl.classList.remove("d-none");
    } finally {
        btn.disabled = false;
        btn.innerHTML = "SAVE LEDGER";
    }
}

async function submitStockQuickAdd() {
    const name = document.getElementById("sqa-name").value.trim();
    const unit = document.getElementById("sqa-unit").value;
    const purchase = document.getElementById("sqa-purchase").value;
    const selling = document.getElementById("sqa-selling").value;
    const hsn = document.getElementById("sqa-hsn").value;
    const tax = document.getElementById("sqa-tax").value;
    const errEl = document.getElementById("sqa-error");

    if (!name) {
        errEl.textContent = "Name is required.";
        errEl.classList.remove("d-none");
        return;
    }

    const btn = document.getElementById("sqa-save-btn");
    btn.disabled = true;

    try {
        const resp = await fetch("{% url 'ocr:stock_item_quick_create' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": qaCsrfToken()
            },
            body: JSON.stringify({
                name, unit, purchase_price: purchase, selling_price: selling,
                hsn_code: hsn, tax_rate_pct: tax
            })
        });
        const data = await resp.json();
        if (data.success) {
            // Add to ALL stock item selects on the page
            const stockSelects = document.querySelectorAll("select.stock-item-select");
            stockSelects.forEach(sel => {
                addOptionOnce(sel, data.id, data.name, {
                    purchaseRate: data.purchase_price,
                    sellingPrice: data.selling_price,
                    unit: data.unit
                });
            });

            _qaTargetSelect.value = data.id;
            _qaTargetSelect.dispatchEvent(new Event('change', { bubbles: true }));
            bootstrap.Modal.getInstance(document.getElementById("stockQuickAddModal")).hide();
            _qaTargetSelect.focus();
        } else {
            errEl.textContent = data.error || "Error creating item.";
            errEl.classList.remove("d-none");
        }
    } catch (e) {
        errEl.textContent = "Network error.";
        errEl.classList.remove("d-none");
    } finally {
        btn.disabled = false;
    }
}

async function submitBatchQuickAdd() {
    const row = _qaTargetSelect?.closest(".stock-row");
    const stockSelect = row?.querySelector(".stock-item-select");
    const godownSelect = row?.querySelector(".godown-select");
    const batchNumber = document.getElementById("bqa-number").value.trim();
    const expiryDate = document.getElementById("bqa-expiry").value;
    const purchaseRate = document.getElementById("bqa-rate").value;
    const quantity = document.getElementById("bqa-qty").value;
    const errEl = document.getElementById("bqa-error");

    if (!stockSelect?.value) {
        errEl.textContent = "Select a stock item before saving this batch.";
        errEl.classList.remove("d-none");
        return;
    }
    if (!batchNumber) {
        errEl.textContent = "Batch number is required.";
        errEl.classList.remove("d-none");
        return;
    }

    const btn = document.getElementById("bqa-save-btn");
    btn.disabled = true;

    try {
        const resp = await fetch("{% url 'inventory:batch_quick_add' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": qaCsrfToken()
            },
            body: JSON.stringify({
                stock_item_id: stockSelect.value,
                godown_id: godownSelect?.value || "",
                batch_number: batchNumber,
                expiry_date: expiryDate,
                purchase_rate: purchaseRate,
                quantity
            })
        });
        const data = await resp.json();
        if (data.success) {
            document.querySelectorAll("select.batch-select").forEach(sel => {
                addOptionOnce(sel, data.id, data.name, {
                    stockItemId: data.stock_item_id,
                    godownId: data.godown_id
                });
            });
            _qaTargetSelect.value = data.id;
            _qaTargetSelect.dispatchEvent(new Event('change', { bubbles: true }));
            bootstrap.Modal.getInstance(document.getElementById("batchQuickAddModal")).hide();
            _qaTargetSelect.focus();
        } else {
            errEl.textContent = data.error || "Error creating batch.";
            errEl.classList.remove("d-none");
        }
    } catch (e) {
        errEl.textContent = "Network error.";
        errEl.classList.remove("d-none");
    } finally {
        btn.disabled = false;
    }
}

async function submitCCQuickAdd() {
    const name = document.getElementById("cc-qa-name").value.trim();
    const errEl = document.getElementById("cc-qa-error");
    if (!name) return;
    const btn = document.getElementById("cc-qa-save-btn");
    btn.disabled = true;
    try {
        const resp = await fetch("{% url 'costcenter:quick_add' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": qaCsrfToken()
            },
            body: JSON.stringify({ name })
        });
        const data = await resp.json();
        if (data.success) {
            const selects = document.querySelectorAll("select.cost-center-select");
            selects.forEach(sel => {
                addOptionOnce(sel, data.id, data.name);
            });
            _qaTargetSelect.value = data.id;
            _qaTargetSelect.dispatchEvent(new Event('change', { bubbles: true }));
            bootstrap.Modal.getInstance(document.getElementById("ccQuickAddModal")).hide();
            _qaTargetSelect.focus();
        } else {
            errEl.textContent = data.error || "Error";
            errEl.classList.remove("d-none");
        }
    } catch (e) {
        errEl.textContent = "Network error";
        errEl.classList.remove("d-none");
    } finally {
        btn.disabled = false;
    }
}
</script>
