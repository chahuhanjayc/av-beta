<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login - Akshaya Vistara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', theme);
        })();
    </script>
    <style>
        :root {
            --body-bg: #f4f7f6;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --input-bg: #ffffff;
            --input-border: #cbd5e1;
        }
        [data-bs-theme="dark"] {
            --body-bg: #1b1b1b;
            --card-bg: #242424;
            --border-color: #3b3b3b;
            --text-main: #f5f5f5;
            --text-muted: #b5b5b5;
            --input-bg: #1a1a1a;
            --input-border: #4a4a4a;
            color-scheme: dark;
        }
        body {
            background: var(--body-bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            max-width: 400px;
            margin: auto;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.18);
            background: var(--card-bg);
            border: 1px solid var(--border-color);
        }
        .form-control {
            background-color: var(--input-bg);
            border-color: var(--input-border);
            color: var(--text-main);
        }
        .form-control::placeholder { color: var(--text-muted); }
        .text-muted { color: var(--text-muted) !important; }
    </style>
</head>
<body>
    <div class="login-card w-100">
        <h3 class="text-center mb-4 fw-bold">Customer Portal</h3>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} small py-2">{{ message }}</div>
            {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small text-muted">Email Address</label>
                <input type="email" name="email" class="form-control" required placeholder="name@company.com">
            </div>
            <div class="mb-4">
                <label class="form-label small text-muted">Password</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Sign In</button>
        </form>
        <p class="text-center mt-4 small text-muted">Secure access to your account ledger.</p>
    </div>
</body>
</html>
