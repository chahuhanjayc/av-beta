# ─────────────────────────────────────────────────────────────────────────────
# Akshaya Vistara Nginx configuration
# - Proxies all requests to Gunicorn (web:8000)
# - Serves /static/ directly and proxies /media/ through Django authorization
# - Sets sensible security headers
# ─────────────────────────────────────────────────────────────────────────────

upstream django_app {
    server web:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;               # Accept any hostname — change to your domain in prod

    client_max_body_size 25M;    # Allow uploading invoices up to 25 MB

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"         always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Static files (Django collectstatic output) ───────────────────────────
    location /static/ {
        alias /staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Media files (uploaded invoices, OCR images) ──────────────────────────
    location /media/ {
        proxy_pass         http://django_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    # ── PWA service worker — no caching (must always be fresh) ───────────────
    location = /static/js/sw.js {
        alias /staticfiles/js/sw.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # ── All other requests → Gunicorn ────────────────────────────────────────
    location / {
        proxy_pass         http://django_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ── Custom error pages ───────────────────────────────────────────────────
    error_page 500 502 503 504 /static/offline.html;
}
